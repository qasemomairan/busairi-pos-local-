<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<title>بنك البسيري | نظام تحليل أخطاء POS الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://unpkg.com/tesseract.js@5.0.5/dist/tesseract.min.js"></script>

<!-- ✅ Supabase SDK v2 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
    /* (جميع الأنماط كما هي – محذوفة للاختصار لكنها موجودة في الكود الأصلي) */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    :root {
        --bg-gradient-start: #0b2b5c; --bg-gradient-mid: #123e7c; --bg-gradient-end: #1b4d8c;
        --card-bg: rgba(15, 35, 65, 0.7); --text-gold: #FFE2A4; --text-gold-dark: #FFD966;
        --text-gold-bright: #FFF2D7; --input-bg: rgba(255,255,255,0.95); --input-color: #0a2f44;
        --border-light: rgba(255,255,255,0.2); --btn-primary-bg: linear-gradient(95deg,#F6B93D,#FF8C42);
        --btn-primary-color: #1e2f47; --algorithm-bg: rgba(0,0,0,0.4); --user-card-bg: rgba(10,25,55,0.75);
        --footer-color: #cfdfed; --dropdown-bg: rgba(15,35,65,0.9);
        --toast-success: #2ecc71; --toast-error: #e74c3c; --toast-warning: #f39c12;
    }
    body.dark {
        --bg-gradient-start: #121212; --bg-gradient-mid: #1e1e2f; --bg-gradient-end: #2a2a3a;
        --card-bg: rgba(20,20,35,0.85); --text-gold: #FFD966; --text-gold-dark: #FFC107;
        --input-bg: rgba(50,50,70,0.95); --input-color: #f0f0f0; --border-light: rgba(255,215,130,0.3);
        --btn-primary-bg: linear-gradient(95deg,#FFB347,#FF8C42); --btn-primary-color: #ffffff;
        --algorithm-bg: rgba(0,0,0,0.6); --user-card-bg: rgba(30,30,50,0.85); --footer-color: #a0a0b0;
        --dropdown-bg: rgba(30,30,50,0.95);
    }
    body {
        min-height: 100vh;
        background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-mid) 50%, var(--bg-gradient-end) 100%);
        display: flex; align-items: center; justify-content: center; padding: 1rem;
        transition: background 0.3s ease; color: var(--text-gold);
        overflow-x: hidden;
    }
    
    @keyframes pulse-gold { 0%, 100% { box-shadow: 0 0 0 0 rgba(255, 217, 102, 0.4); } 50% { box-shadow: 0 0 0 12px rgba(255, 217, 102, 0); } }
    @keyframes slide-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .glass-card {
        background: var(--card-bg); backdrop-filter: blur(14px); border-radius: 2rem;
        width: 100%; max-width: 720px; padding: 1.5rem;
        box-shadow: 0 25px 45px rgba(0,0,0,0.3); border: 1px solid var(--border-light);
        animation: slide-up 0.4s ease;    }
    .brand { text-align: center; margin-bottom: 1.2rem; position: relative; }
    .brand i { font-size: 2.5rem; background: linear-gradient(135deg,var(--text-gold-bright),var(--text-gold-dark)); -webkit-background-clip: text; background-clip: text; color: transparent; animation: pulse-gold 3s infinite; }
    .brand h2 { font-size: 1.6rem; font-weight: 800; background: linear-gradient(to left,var(--text-gold-bright),var(--text-gold-dark)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .welcome-badge { display: inline-block; background: linear-gradient(135deg, rgba(255,217,102,0.2), rgba(255,140,66,0.2)); padding: 0.3rem 1rem; border-radius: 2rem; font-size: 0.85rem; font-weight: 600; margin-top: 0.5rem; border: 1px solid var(--text-gold-dark); }
    .theme-toggle { position: absolute; top: 0.5rem; left: 0.5rem; background: rgba(0,0,0,0.4); border: none; border-radius: 2rem; padding: 0.4rem 0.8rem; color: var(--text-gold-dark); cursor: pointer; font-size: 0.8rem; z-index: 10; transition: all 0.2s ease; }
    .theme-toggle:hover { background: rgba(0,0,0,0.6); transform: scale(1.05); }
    .input-field, select, textarea { width: 100%; padding: 0.8rem; margin: 0.5rem 0; border: none; border-radius: 2rem; background: var(--input-bg); color: var(--input-color); font-size: 1rem; text-align: center; transition: 0.2s; }
    .input-field:focus, select:focus, textarea:focus { outline: none; transform: scale(0.98); box-shadow: 0 0 0 2px var(--text-gold-dark); }
    .btn-primary, .btn-secondary, .small-btn { border: none; border-radius: 2rem; padding: 0.8rem; font-weight: bold; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary { background: var(--btn-primary-bg); color: var(--btn-primary-color); width: 100%; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255,140,66,0.4); }
    .btn-secondary { background: rgba(255,255,240,0.18); border: 1px solid var(--text-gold-dark); color: var(--text-gold); width: 100%; }
    .btn-secondary:hover { background: rgba(255,255,240,0.28); }
    .small-btn { background: #FFB347; color: #1e2f47; padding: 0.5rem 1rem; }
    .small-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 15px rgba(255,179,71,0.4); }
    .navbar-dropdown { margin: 1rem 0; position: relative; width: 100%; }
    .dropdown-select { width: 100%; padding: 0.8rem 1rem; background: var(--dropdown-bg); border: 1px solid var(--text-gold-dark); border-radius: 2rem; color: var(--text-gold); font-size: 1rem; font-weight: 600; cursor: pointer; appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23FFD966' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>"); background-repeat: no-repeat; background-position: left 1rem center; background-size: 1rem; text-align: center; }
    .tab-content { display: none; animation: fade 0.3s ease; margin-top: 0.5rem; }
    .tab-content.active { display: block; }
    @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .user-card, .log-entry, .error-card { background: var(--user-card-bg); border-radius: 1rem; padding: 0.7rem; margin-bottom: 0.6rem; display: flex; justify-content: space-between; flex-wrap: wrap; align-items: center; gap: 8px; border-right: 3px solid var(--text-gold-dark); color: var(--text-gold); transition: all 0.2s ease; cursor: pointer; animation: slide-up 0.3s ease; }
    .user-card:hover, .error-card:hover { transform: translateX(-5px); box-shadow: 0 8px 25px rgba(255, 217, 102, 0.2); }
    .algorithm-box { background: var(--algorithm-bg); border-radius: 1.5rem; padding: 1.2rem; margin: 1rem 0; text-align: center; border: 1px solid var(--text-gold-dark); position: relative; overflow: hidden; }
    .algorithm-box::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,217,102,0.1), transparent); animation: shimmer 3s infinite; }
    .result-number { font-size: 2.5rem; font-weight: 800; letter-spacing: 4px; background: linear-gradient(130deg, var(--text-gold-bright), var(--text-gold-dark)); -webkit-background-clip: text; background-clip: text; color: transparent; direction: ltr; margin: 0.5rem 0; text-shadow: 0 0 20px rgba(255,217,102,0.3); }
    .copy-btn { background: #2c7a47; color: white; border: none; border-radius: 2rem; padding: 0.4rem 1.2rem; margin-top: 0.5rem; cursor: pointer; transition: all 0.2s; }
    .copy-btn:hover { background: #27ae60; transform: translateY(-2px); }
    .flex-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; justify-content: center; }
    .grid-form { display: grid; grid-template-columns: 1fr 1fr auto; gap: 0.8rem; align-items: end; margin: 1rem 0; }
    .grid-form .input-field { margin: 0; }
    .grid-full { grid-column: span 3; }
    .hidden { display: none !important; }
    .footer-note { text-align: center; font-size: 0.7rem; margin-top: 1rem; color: var(--footer-color); opacity: 0.8; }
    
    @media (max-width: 600px) {
        .glass-card { padding: 1rem; border-radius: 1.5rem; }
        .grid-form { grid-template-columns: 1fr; gap: 0.5rem; }
        .grid-full { grid-column: span 1; }
        .result-number { font-size: 2rem; letter-spacing: 2px; }
        .brand h2 { font-size: 1.4rem; }
        .brand i { font-size: 2rem; }
    }
    
    .camera-container { position: relative; border-radius: 1.5rem; overflow: hidden; border: 2px solid var(--text-gold-dark); background: #000; margin: 0.5rem 0; }
    .camera-preview { width: 100%; border-radius: 1rem; margin: 0.5rem 0; background: #000; display: block; }
    .camera-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; height: 65%; border: 3px dashed rgba(255, 217, 102, 0.7); border-radius: 1rem; pointer-events: none; animation: pulse-gold 2.5s infinite; box-shadow: 0 0 30px rgba(255, 217, 102, 0.2); }
    .camera-overlay::after { content: '📄 ضع المستند داخل الإطار'; position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%); font-size: 0.75rem; color: var(--text-gold); background: rgba(0,0,0,0.6); padding: 0.3rem 0.8rem; border-radius: 1rem; white-space: nowrap; }
    .captured-img { max-width: 100%; border-radius: 1rem; margin-top: 0.5rem; border: 2px solid var(--text-gold-dark); animation: slide-up 0.3s ease; }
    .toast-container { position: fixed; top: 1rem; left: 50%; transform: translateX(-50%); z-index: 10000; display: flex; flex-direction: column; gap: 0.5rem; max-width: 90%; pointer-events: none; }
    .toast { background: rgba(20, 40, 70, 0.98); color: var(--text-gold); padding: 0.9rem 1.3rem; border-radius: 1.2rem; border-right: 4px solid var(--text-gold-dark); display: flex; align-items: center; gap: 0.9rem; animation: slide-up 0.3s ease; box-shadow: 0 10px 40px rgba(0,0,0,0.4); backdrop-filter: blur(12px); pointer-events: auto; max-width: 100%; }
    .toast.success { border-right-color: var(--toast-success); }
    .toast.error { border-right-color: var(--toast-error); }
    .toast.warning { border-right-color: var(--toast-warning); }
    .toast i { font-size: 1.2rem; }
    
    .ai-result-box { background: linear-gradient(135deg, rgba(255,217,102,0.12), rgba(255,140,66,0.12)); border: 1px solid var(--text-gold-dark); border-radius: 1.5rem; padding: 1.2rem; margin-top: 1rem; position: relative; overflow: hidden; animation: slide-up 0.4s ease; }
    .ai-result-box::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,217,102,0.25), transparent); animation: shimmer 2.5s infinite; }
    
    .error-severity { display: inline-flex; align-items: center; gap: 4px; padding: 0.25rem 0.7rem; border-radius: 2rem; font-size: 0.75rem; font-weight: 700; }
    .severity-high { background: rgba(231, 76, 60, 0.25); color: #ff7675; border: 1px solid rgba(231,76,60,0.4); }
    .severity-medium { background: rgba(243, 156, 18, 0.25); color: #fdcb6e; border: 1px solid rgba(243,156,18,0.4); }
    .severity-low { background: rgba(46, 204, 113, 0.25); color: #55efc4; border: 1px solid rgba(46,204,113,0.4); }
    
    .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,217,102,0.3); border-radius: 50%; border-top-color: var(--text-gold-dark); animation: spin 1s linear infinite; margin-left: 0.5rem; vertical-align: middle; }
    .ocr-status { font-size: 0.85rem; color: var(--text-gold); margin: 0.8rem 0; display: flex; align-items: center; gap: 6px; padding: 0.5rem; background: rgba(0,0,0,0.2); border-radius: 1rem; }
    .section-title { font-weight: 700; margin-bottom: 0.8rem; display: flex; align-items: center; gap: 8px; color: var(--text-gold); font-size: 1.1rem; }
    .section-title i { color: var(--text-gold-dark); }
    .solution-box { background: rgba(0,0,0,0.35); border-radius: 1rem; padding: 0.9rem; margin-top: 1rem; border-right: 3px solid #2c7a47; animation: slide-up 0.3s ease; }
    
    #progressOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; z-index: 5000; backdrop-filter: blur(8px); }
    #progressOverlay .progress-card { background: var(--card-bg); padding: 1.8rem; border-radius: 1.8rem; border: 1px solid var(--text-gold-dark); text-align: center; min-width: 280px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    #progressOverlay .spinner-lg { width: 50px; height: 50px; border-width: 4px; margin: 0 auto 1.2rem; }
    #progressBar { height: 100%; background: var(--btn-primary-bg); width: 0%; transition: width 0.4s ease; border-radius: 1rem; }
    
    .algorithm-label { font-size: 0.9rem; color: var(--footer-color); margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .algorithm-sub { margin-top: 12px; font-size: 0.75rem; color: var(--footer-color); background: rgba(0,0,0,0.3); padding: 0.5rem; border-radius: 0.8rem; }
    .upload-label { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.15); border: 1px dashed var(--text-gold-dark); padding: 0.6rem 1.2rem; border-radius: 2rem; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; }
    .upload-label:hover { background: rgba(255,255,255,0.25); transform: translateY(-2px); }
    .upload-label input { display: none; }
    .divider { text-align: center; color: var(--footer-color); font-size: 0.85rem; margin: 0.8rem 0; position: relative; }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 35%; height: 1px; background: var(--border-light); }
    .divider::before { right: 0; }
    .divider::after { left: 0; }
    
    .connection-status {
        position: fixed; top: 1rem; right: 1rem;
        padding: 0.4rem 0.8rem; border-radius: 1rem;
        font-size: 0.75rem; display: flex; align-items: center; gap: 6px;
        background: rgba(0,0,0,0.5); z-index: 1000;
    }
    .connection-status.connected { color: #2ecc71; }
    .connection-status.disconnected { color: #e74c3c; }
    .connection-status.connecting { color: #f39c12; }
</style>
</head>
<body>

<div class="connection-status connecting" id="connStatus">
    <i class="fas fa-spinner fa-spin"></i> جاري الاتصال...
</div>
<div id="toastContainer" class="toast-container"></div>

<div class="glass-card" id="loginBox">
    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i> الوضع</button>
    <div class="brand">
        <i class="fas fa-landmark"></i>
        <h2>بنك البسيري الدولي</h2>
        <p style="color:var(--footer-color);font-size:0.9rem;">نظام تحليل أخطاء POS الذكي ✨ <span style="color:#00b4d8;">Supabase</span></p>
    </div>
    <input type="text" id="loginUsername" class="input-field" placeholder="👤 اسم المستخدم">
    <input type="password" id="loginPassword" class="input-field" placeholder="🔐 كلمة المرور">
    <button class="btn-primary" onclick="login()">
        <i class="fas fa-sign-in-alt"></i> دخول آمن
    </button>
    <div class="footer-note">© 2026 بنك البسيري الدولي - جميع الحقوق محفوظة | جاسم عميران</div>
</div>

<div class="glass-card hidden" id="appBox">
    <button class="theme-toggle" id="themeToggleApp"><i class="fas fa-moon"></i> الوضع</button>
    <div class="brand">
        <i class="fas fa-chart-line"></i>
        <h2 id="appTitle">بسيري Pay</h2>
        <div class="welcome-badge" id="userRoleBadge"></div>
    </div>

    <div class="navbar-dropdown" id="navbarDropdownContainer" style="display: none;">
        <select id="navSelect" class="dropdown-select"></select>
    </div>

    <!-- باقي الأقسام (tabs) نفسها كما في الكود الأصلي - لم أكررها للاختصار، لكنها موجودة في الكود الكامل -->
    <div id="tabAlgorithm" class="tab-content">...</div>
    <div id="tabChangePass" class="tab-content">...</div>
    <div id="tabUsers" class="tab-content">...</div>
    <div id="tabLogs" class="tab-content">...</div>
    <div id="tabCashierPerms" class="tab-content">...</div>
    <div id="tabErrors" class="tab-content">...</div>
    <div id="tabCamera" class="tab-content">...</div>

    <button class="btn-secondary" onclick="logout()">
        <i class="fas fa-power-off"></i> تسجيل الخروج الآمن
    </button>
    <div class="footer-note">© 2026 بنك البسيري الدولي - جميع الحقوق محفوظة | جاسم عميران</div>
</div>

<div id="progressOverlay">...</div>

<script>
    // ==================== ⚙️ إعدادات Supabase ====================
    const SUPABASE_URL = 'https://ochnsppkbaqnjusacnzq.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jaG5zcHBrYmFxbmp1c2FjbnpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMTg5NTQsImV4cCI6MjA4OTg5NDk1NH0.TrEtjR8rPzT_nS-1bTg0rLHQO5YgizsolZ4KJ_9kHEI';
    
    let supabase;
    let isSupabaseReady = false;
    let useLocalFallback = false;   // للتبديل إلى localStorage عند فشل Supabase

    try {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('✅ Supabase client created');
    } catch (e) {
        console.error('❌ Supabase init error:', e);
        useLocalFallback = true;
    }

    // ==================== التخزين المحلي الاحتياطي ====================
    const LOCAL_STORAGE_KEYS = {
        USERS: 'busairi_local_users',
        LOGS: 'busairi_local_logs',
        PERMISSIONS: 'busairi_local_perms',
        ERRORS: 'busairi_local_errors'
    };

    function getLocalData(key, defaultVal=[]) {
        const data = localStorage.getItem(key);
        return data ? JSON.parse(data) : defaultVal;
    }
    function setLocalData(key, val) {
        localStorage.setItem(key, JSON.stringify(val));
    }

    // ==================== اختبار الاتصال ====================
    async function testSupabaseConnection() {
        const statusEl = document.getElementById('connStatus');
        if (useLocalFallback) {
            statusEl.className = 'connection-status disconnected';
            statusEl.innerHTML = '<i class="fas fa-database"></i> وضع التخزين المحلي';
            return false;
        }
        try {
            const { data, error } = await supabase.from('users').select('id').limit(1);
            if (error) {
                if (error.code === '42P01') { // جدول غير موجود
                    statusEl.className = 'connection-status connecting';
                    statusEl.innerHTML = '<i class="fas fa-table"></i> الجداول غير موجودة';
                    useLocalFallback = true;
                    return false;
                }
                throw error;
            }
            isSupabaseReady = true;
            statusEl.className = 'connection-status connected';
            statusEl.innerHTML = '<i class="fas fa-check-circle"></i> متصل ✅';
            return true;
        } catch (e) {
            console.error('Connection test failed:', e);
            statusEl.className = 'connection-status disconnected';
            statusEl.innerHTML = '<i class="fas fa-exclamation-triangle"></i> فشل الاتصال';
            useLocalFallback = true;
            return false;
        }
    }

    // ==================== دوال البيانات (تستخدم Supabase أو LocalStorage) ====================
    async function getUsers() {
        if (useLocalFallback) return getLocalData(LOCAL_STORAGE_KEYS.USERS, []);
        try {
            const { data, error } = await supabase.from('users').select('*');
            if (error) throw error;
            return data || [];
        } catch(e) { console.error(e); return []; }
    }

    async function saveUser(user, isUpdate = false) {
        if (useLocalFallback) {
            let users = getLocalData(LOCAL_STORAGE_KEYS.USERS, []);
            if (isUpdate) {
                const index = users.findIndex(u => u.username === user.username);
                if (index !== -1) users[index] = { ...users[index], ...user };
                else users.push(user);
            } else {
                users.push(user);
            }
            setLocalData(LOCAL_STORAGE_KEYS.USERS, users);
            return user;
        }
        try {
            if (isUpdate) {
                const { data, error } = await supabase
                    .from('users')
                    .update(user)
                    .eq('username', user.username)
                    .select();
                if (error) throw error;
                return data?.[0];
            } else {
                const { data, error } = await supabase
                    .from('users')
                    .insert([user])
                    .select();
                if (error) throw error;
                return data?.[0];
            }
        } catch(e) { console.error(e); return null; }
    }

    async function addLog(action, details) {
        if (useLocalFallback) {
            const logs = getLocalData(LOCAL_STORAGE_KEYS.LOGS, []);
            logs.unshift({ action, details, created_at: new Date().toISOString() });
            setLocalData(LOCAL_STORAGE_KEYS.LOGS, logs);
            if (document.getElementById("tabLogs")?.classList.contains("active")) renderLogs();
            return;
        }
        try {
            await supabase.from('logs').insert([{
                action, details,
                user_id: currentUser?.id || null,
                created_at: new Date().toISOString()
            }]);
            if (document.getElementById("tabLogs")?.classList.contains("active")) renderLogs();
        } catch(e) { console.error(e); }
    }

    async function getLogs() {
        if (useLocalFallback) return getLocalData(LOCAL_STORAGE_KEYS.LOGS, []);
        try {
            const { data, error } = await supabase
                .from('logs')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(50);
            if (error) throw error;
            return data || [];
        } catch(e) { console.error(e); return []; }
    }

    async function clearLogs() {
        if (!confirm("⚠️ هل أنت متأكد من مسح كل السجلات؟")) return;
        if (useLocalFallback) {
            setLocalData(LOCAL_STORAGE_KEYS.LOGS, []);
            await addLog("🗑️ مسح السجل", "تم حذف جميع السجلات");
            renderLogs();
            showToast("✅ تم مسح السجل بنجاح", "success");
            return;
        }
        try {
            await supabase.from('logs').delete().neq('id', 0);
            await addLog("🗑️ مسح السجل", "تم حذف جميع السجلات");
            renderLogs();
            showToast("✅ تم مسح السجل بنجاح", "success");
        } catch(e) { console.error(e); showToast("❌ فشل المسح", "error"); }
    }

    async function getPermissions() {
        if (useLocalFallback) return getLocalData(LOCAL_STORAGE_KEYS.PERMISSIONS, {});
        try {
            const { data, error } = await supabase.from('permissions').select('*');
            if (error) throw error;
            const perms = {};
            (data || []).forEach(p => { perms[p.username] = p; });
            return perms;
        } catch(e) { console.error(e); return {}; }
    }

    async function savePermissions(username, perms) {
        if (useLocalFallback) {
            const all = getLocalData(LOCAL_STORAGE_KEYS.PERMISSIONS, {});
            all[username] = perms;
            setLocalData(LOCAL_STORAGE_KEYS.PERMISSIONS, all);
            return;
        }
        try {
            const { data: existing } = await supabase
                .from('permissions')
                .select('id')
                .eq('username', username)
                .single();
            if (existing?.id) {
                await supabase.from('permissions').update(perms).eq('id', existing.id);
            } else {
                await supabase.from('permissions').insert([{ username, ...perms }]);
            }
        } catch(e) { console.error(e); }
    }

    async function getErrors() {
        if (useLocalFallback) return getLocalData(LOCAL_STORAGE_KEYS.ERRORS, []);
        try {
            const { data, error } = await supabase.from('errors').select('*');
            if (error) throw error;
            return data || [];
        } catch(e) { console.error(e); return []; }
    }

    async function saveErrors(errors) {
        if (useLocalFallback) {
            setLocalData(LOCAL_STORAGE_KEYS.ERRORS, errors);
            return;
        }
        for (const err of errors) {
            await supabase.from('errors').upsert({
                id: err.id,
                problem: err.problem,
                solution: err.solution,
                severity: err.severity,
                updated_at: new Date().toISOString()
            }, { onConflict: 'id' });
        }
    }

    // ==================== باقي الدوال (كاميرا، واجهة، إلخ) نفسها كما في الكود الأصلي ====================
    // (لن أكررها كلها هنا للاختصار، لكنها موجودة في الملف الكامل الذي ستنسخه)
    // ...

    // ==================== بدء التطبيق ====================
    window.addEventListener("DOMContentLoaded", async () => {
        initTheme();
        await testSupabaseConnection();
        if (!useLocalFallback && isSupabaseReady) {
            await initSupabaseData();
        } else {
            // تهيئة بيانات محلية افتراضية
            const localUsers = getLocalData(LOCAL_STORAGE_KEYS.USERS, []);
            if (localUsers.length === 0) {
                setLocalData(LOCAL_STORAGE_KEYS.USERS, [
                    { username: "admin", password: "admin123", role: "admin" },
                    { username: "cashier1", password: "1234", role: "cashier" },
                    { username: "user1", password: "1234", role: "user" }
                ]);
            }
            const localErrors = getLocalData(LOCAL_STORAGE_KEYS.ERRORS, []);
            if (localErrors.length === 0) {
                setLocalData(LOCAL_STORAGE_KEYS.ERRORS, [
                    { id: "1", problem: "Insufficient funds", solution: "لا يوجد رصيد كافٍ", severity: "medium" },
                    { id: "2", problem: "Card declined", solution: "البطاقة مرفوضة", severity: "high" },
                    { id: "3", problem: "Invalid PIN", solution: "الرقم السري غير صحيح", severity: "low" }
                ]);
            }
        }

        const stored = sessionStorage.getItem("currentUser");
        if (stored) {
            try {
                const user = JSON.parse(stored);
                showApp(user);
                showToast(`🎉 مرحباً بعودتك، ${user.username}!`, "success");
            } catch(e) { sessionStorage.clear(); }
        }
    });
</script>
</body>
